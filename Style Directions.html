<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Charitha — Style Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Chakra+Petch:wght@400;500;600;700&family=Press+Start+2P&family=VT323&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #1a1a1d; }

  /* ============ DIRECTION A — CINEMATIC ============ */
  .cin {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(120% 90% at 70% -10%, #2a1206 0%, #0c0a08 55%, #060504 100%);
    font-family: 'Chakra Petch', sans-serif; color: #f3ece2;
  }
  .cin__bg {
    position: absolute; inset: 0;
    background: url('https://smartcharith.github.io/assets/img/portfolio-1.jpg') center 30%/cover no-repeat;
    opacity: 0.32; filter: grayscale(0.3) contrast(1.05);
    mask-image: linear-gradient(90deg, transparent 0%, #000 45%, #000 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 45%, #000 100%);
  }
  .cin__bg::after { content:''; position:absolute; inset:0; background: linear-gradient(180deg, rgba(6,5,4,.2), rgba(6,5,4,.95)); }
  .cin__embers { position: absolute; inset: 0; pointer-events: none; }
  .cin__ember { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #ff8a3d; box-shadow: 0 0 8px 2px rgba(255,120,40,.7); bottom: -10px; animation: cinRise linear infinite; }
  @keyframes cinRise { to { transform: translateY(-720px) translateX(40px); opacity: 0; } }
  .cin__nav { position: relative; z-index: 3; display: flex; align-items: center; justify-content: space-between; padding: 28px 56px; }
  .cin__logo { font-weight: 700; letter-spacing: .28em; font-size: 15px; text-transform: uppercase; }
  .cin__logo b { color: #ff8a3d; }
  .cin__links { display: flex; gap: 34px; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: #b6a89a; }
  .cin__cta { border: 1px solid #ff8a3d; color: #ff8a3d; padding: 9px 20px; font-size: 12px; letter-spacing: .2em; text-transform: uppercase; }
  .cin__hero { position: relative; z-index: 3; padding: 70px 56px 0; }
  .cin__tag { display: inline-flex; align-items: center; gap: 10px; font-size: 12px; letter-spacing: .35em; text-transform: uppercase; color: #ff8a3d; margin-bottom: 22px; }
  .cin__tag::before { content:''; width: 34px; height: 1px; background: #ff8a3d; }
  .cin__name { font-family: 'Anton', sans-serif; font-weight: 400; font-size: 132px; line-height: .9; letter-spacing: -.01em; text-transform: uppercase; margin: 0; }
  .cin__name span { display: block; color: transparent; -webkit-text-stroke: 1.5px #6b5b48; }
  .cin__sub { max-width: 560px; margin: 26px 0 0; font-size: 18px; line-height: 1.5; color: #c9bcab; }
  .cin__row { display: flex; gap: 16px; margin-top: 34px; }
  .cin__btn1 { background: #ff8a3d; color: #1a0d04; padding: 15px 30px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; font-size: 14px; display: inline-flex; gap: 10px; align-items: center; }
  .cin__btn2 { border: 1px solid #4a4036; color: #f3ece2; padding: 15px 30px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; font-size: 14px; }
  .cin__stats { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; display: grid; grid-template-columns: repeat(4,1fr); border-top: 1px solid rgba(255,138,61,.22); background: rgba(8,6,4,.6); backdrop-filter: blur(4px); }
  .cin__stat { padding: 22px 56px; border-right: 1px solid rgba(255,138,61,.14); }
  .cin__stat b { font-family: 'Anton', sans-serif; font-size: 38px; color: #ff8a3d; display: block; line-height: 1; }
  .cin__stat span { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: #9a8d7d; }

  /* ============ DIRECTION B — ARCADE ============ */
  .arc { position: relative; width: 100%; height: 100%; overflow: hidden; background: #0d0221; font-family: 'VT323', monospace; color: #e9f7ff; }
  .arc__grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,46,213,.12) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,.10) 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(180deg,#000,transparent 80%); -webkit-mask-image: linear-gradient(180deg,#000,transparent 80%); }
  .arc__scan { position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, transparent 2px 4px); mix-blend-mode: multiply; }
  .arc__glowtop { position:absolute; top:-160px; left:50%; transform:translateX(-50%); width:760px; height:360px; background: radial-gradient(closest-side, rgba(255,46,213,.35), transparent); filter: blur(6px); }
  .arc__nav { position: relative; z-index: 3; display: flex; justify-content: space-between; align-items: center; padding: 26px 48px; font-family: 'Press Start 2P', monospace; }
  .arc__logo { font-size: 13px; color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,.6); }
  .arc__logo b { color: #ff2ed5; }
  .arc__links { display: flex; gap: 26px; font-size: 9px; color: #b9a7e6; }
  .arc__hero { position: relative; z-index: 3; text-align: center; padding: 64px 40px 0; }
  .arc__badge { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #ffe14d; letter-spacing: 1px; margin-bottom: 26px; animation: arcBlink 1.1s steps(1) infinite; }
  @keyframes arcBlink { 50% { opacity: .25; } }
  .arc__title { font-family: 'Press Start 2P', monospace; font-size: 56px; line-height: 1.18; margin: 0; color: #fff; text-shadow: 4px 4px 0 #ff2ed5, 8px 8px 0 #00f0ff; }
  .arc__title em { color: #ffe14d; font-style: normal; }
  .arc__sub { font-size: 27px; line-height: 1.3; color: #b9d9e8; margin: 30px auto 0; max-width: 620px; }
  .arc__sub b { color: #00f0ff; }
  .arc__row { display: flex; gap: 18px; justify-content: center; margin-top: 36px; font-family: 'Press Start 2P', monospace; font-size: 11px; }
  .arc__b1 { background: #ff2ed5; color: #0d0221; padding: 16px 22px; box-shadow: 5px 5px 0 #7a008f; }
  .arc__b2 { background: transparent; color: #00f0ff; padding: 16px 22px; border: 2px solid #00f0ff; box-shadow: 5px 5px 0 rgba(0,240,255,.4); }
  .arc__cards { display: flex; gap: 18px; justify-content: center; margin-top: 52px; }
  .arc__card { width: 190px; height: 116px; border: 3px solid #00f0ff; padding: 4px; background: #160a33; position: relative; image-rendering: pixelated; }
  .arc__card img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; filter: saturate(1.1) contrast(1.05); }
  .arc__card span { position: absolute; bottom: 6px; left: 6px; font-family: 'Press Start 2P', monospace; font-size: 7px; background: #ff2ed5; color: #0d0221; padding: 4px 6px; }

  /* ============ DIRECTION C — MINIMAL EDITORIAL ============ */
  .min { position: relative; width: 100%; height: 100%; overflow: hidden; background: #0e0f0d; font-family: 'Space Grotesk', sans-serif; color: #ecefe8; }
  .min__lines { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(12,1fr); pointer-events: none; }
  .min__lines i { border-right: 1px solid rgba(255,255,255,.035); }
  .min__nav { position: relative; z-index: 3; display: flex; justify-content: space-between; align-items: center; padding: 32px 60px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .min__logo { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
  .min__logo b { color: #c6ff3a; }
  .min__links { display: flex; gap: 36px; font-family: 'Space Mono', monospace; font-size: 13px; color: #9aa094; }
  .min__avail { font-family: 'Space Mono', monospace; font-size: 12px; color: #c6ff3a; display: flex; align-items: center; gap: 8px; }
  .min__avail::before { content:''; width: 7px; height: 7px; border-radius: 50%; background: #c6ff3a; box-shadow: 0 0 0 0 rgba(198,255,58,.5); animation: minPulse 2s infinite; }
  @keyframes minPulse { 70% { box-shadow: 0 0 0 9px rgba(198,255,58,0); } 100% { box-shadow: 0 0 0 0 rgba(198,255,58,0); } }
  .min__hero { position: relative; z-index: 3; padding: 76px 60px 0; }
  .min__idx { font-family: 'Space Mono', monospace; font-size: 13px; color: #6f756a; letter-spacing: .1em; }
  .min__h { font-size: 108px; line-height: .98; font-weight: 700; letter-spacing: -.035em; margin: 18px 0 0; }
  .min__h .mut { color: #6f756a; }
  .min__h .acc { color: #c6ff3a; }
  .min__meta { display: flex; gap: 56px; margin-top: 44px; max-width: 880px; }
  .min__meta > div { flex: 1; }
  .min__meta h4 { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #6f756a; margin: 0 0 10px; }
  .min__meta p { margin: 0; font-size: 15px; line-height: 1.5; color: #c2c7bb; }
  .min__foot { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; display: flex; justify-content: space-between; align-items: center; padding: 22px 60px; border-top: 1px solid rgba(255,255,255,.08); font-family: 'Space Mono', monospace; font-size: 13px; color: #9aa094; }
  .min__marq { display: flex; gap: 40px; color: #6f756a; }
  .min__cta { background: #c6ff3a; color: #0e0f0d; padding: 12px 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function Embers() {
  const arr = Array.from({length: 26});
  return (
    <div className="cin__embers">
      {arr.map((_, i) => {
        const left = Math.random() * 100;
        const dur = 5 + Math.random() * 7;
        const delay = -Math.random() * 12;
        const size = 2 + Math.random() * 3;
        return <span key={i} className="cin__ember" style={{ left: left + '%', width: size, height: size, animationDuration: dur + 's', animationDelay: delay + 's' }} />;
      })}
    </div>
  );
}

function Cinematic() {
  return (
    <div className="cin">
      <div className="cin__bg" />
      <Embers />
      <nav className="cin__nav">
        <div className="cin__logo">CHARITHA<b>.</b>DEV</div>
        <div className="cin__links"><span>Work</span><span>About</span><span>Experience</span><span>Devlog</span></div>
        <div className="cin__cta">Contact</div>
      </nav>
      <div className="cin__hero">
        <div className="cin__tag">Senior Game Developer · Unreal · Unity</div>
        <h1 className="cin__name">Charitha<span>Madusanka</span></h1>
        <p className="cin__sub">I turn design concepts into playable, shippable games — gameplay systems, AI, VR/AR and engine tools across 22 launched projects.</p>
        <div className="cin__row">
          <div className="cin__btn1">▶ Watch Showreel</div>
          <div className="cin__btn2">View Projects</div>
        </div>
      </div>
      <div className="cin__stats">
        <div className="cin__stat"><b>22</b><span>Projects</span></div>
        <div className="cin__stat"><b>04</b><span>Steam Games</span></div>
        <div className="cin__stat"><b>150</b><span>Marketplace Assets</span></div>
        <div className="cin__stat"><b>16</b><span>VR / AR Builds</span></div>
      </div>
    </div>
  );
}

function Arcade() {
  return (
    <div className="arc">
      <div className="arc__grid" />
      <div className="arc__glowtop" />
      <nav className="arc__nav">
        <div className="arc__logo">CHARITHA<b>_</b>DEV</div>
        <div className="arc__links"><span>WORK</span><span>ABOUT</span><span>SKILLS</span><span>CONTACT</span></div>
      </nav>
      <div className="arc__hero">
        <div className="arc__badge">★ PRESS START ★ PLAYER 1 ★</div>
        <h1 className="arc__title">CHARITHA<br/><em>MADUSANKA</em></h1>
        <p className="arc__sub">SENIOR <b>GAME DEVELOPER</b> — UNREAL + UNITY. SHIPPING GAMEPLAY, AI &amp; VR SINCE 2018.</p>
        <div className="arc__row">
          <div className="arc__b1">▶ VIEW WORKS</div>
          <div className="arc__b2">CONTACT</div>
        </div>
        <div className="arc__cards">
          <div className="arc__card"><img src="https://smartcharith.github.io/assets/img/portfolio-1.jpg" alt="" /><span>MONSTERS DOMAIN</span></div>
          <div className="arc__card"><img src="https://smartcharith.github.io/assets/img/portfolio-2.jpg" alt="" /><span>NERO</span></div>
          <div className="arc__card"><img src="https://smartcharith.github.io/assets/img/portfolio-8.jpg" alt="" /><span>KANCHAYUDHA</span></div>
        </div>
      </div>
      <div className="arc__scan" />
    </div>
  );
}

function Minimal() {
  return (
    <div className="min">
      <div className="min__lines">{Array.from({length:12}).map((_,i)=><i key={i}/>)}</div>
      <nav className="min__nav">
        <div className="min__logo">Charitha M<b>.</b></div>
        <div className="min__links"><span>Work</span><span>About</span><span>Experience</span><span>Devlog</span></div>
        <div className="min__avail">Available for freelance</div>
      </nav>
      <div className="min__hero">
        <div className="min__idx">[ SENIOR GAME DEVELOPER — UNREAL / UNITY / VR / AR ]</div>
        <h1 className="min__h">Gameplay systems<br/><span className="mut">that ship.</span> <span className="acc">Playable</span><br/>worlds, built right.</h1>
        <div className="min__meta">
          <div><h4>Focus</h4><p>Gameplay programming, Game AI, VR/AR, physics-based games and engine tooling.</p></div>
          <div><h4>Now</h4><p>Senior Gameplay Engineer at Ripstone Games — an unannounced PlayStation title.</p></div>
          <div><h4>Selected</h4><p>Monsters Domain · NERO · Kanchayudha · Mithuraa · Sigiriya VR.</p></div>
        </div>
      </div>
      <div className="min__foot">
        <div className="min__marq"><span>UNREAL ENGINE 5</span><span>UNITY</span><span>C++</span><span>GAME AI</span><span>NIAGARA VFX</span></div>
        <div className="min__cta">Start a project →</div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dirs" title="Hero Style Directions" subtitle="Three directions for your portfolio — pick one (or mix). Open any in focus mode to see it big.">
        <DCArtboard id="a" label="A · Cinematic — AAA trailer" width={1280} height={760}><Cinematic /></DCArtboard>
        <DCArtboard id="b" label="B · Arcade — retro pixel / neon" width={1280} height={760}><Arcade /></DCArtboard>
        <DCArtboard id="c" label="C · Minimal — editorial / clean" width={1280} height={760}><Minimal /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
